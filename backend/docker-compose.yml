services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto160-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/auto160
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_MINUTES: 10080
      BOOTSTRAP_ADMIN_EMAIL: admin@auto160.com
      BOOTSTRAP_ADMIN_LOGIN: admin
      BOOTSTRAP_ADMIN_NAME: Auto160 Admin
      BOOTSTRAP_ADMIN_PASSWORD: admin12345
      CATALOG_SEED_CSV_PATH: app/data/catalog_u160_audi_bmw_mini.csv
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: auto160-media
      S3_REGION: us-east-1
      S3_PRESIGN_EXPIRES_SECONDS: 3600
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:16
    container_name: auto160-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auto160
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auto160"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: auto160-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  avby-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto160-avby-sync
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: >
      python tools/schedule_avby_listings_sync.py
      --interval-minutes 20
      --year-min 2010
      --price-usd-min 10000
      --max-hp 160
      --creation-date 10
      --sort 4
      --max-pages 30
      --per-model-limit 30
      --archive-overpowered

volumes:
  pgdata:
  minio_data:
