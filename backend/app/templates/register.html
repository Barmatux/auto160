{% extends "base.html" %}
{% block title %}Регистрация - Auto160{% endblock %}
{% block content %}
<h1>Регистрация</h1>
<p class="hint">Регистрация по email. Логин генерируется автоматически и показывается после создания.</p>

<form class="form" onsubmit="event.preventDefault(); registerByApi();">
  <label>Имя <input id="name" required /></label>
  <label>Email <input id="email" type="email" required /></label>
  <label>Пароль <input id="password" type="password" required minlength="6" /></label>
  <button type="submit">Создать аккаунт</button>
</form>

<pre id="result" class="result"></pre>

{% include "partials/auth_script.html" %}
<script>
  async function registerByApi() {
    const payload = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value,
      role: "seller",
    };
    const response = await fetch("/api/v1/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await response.json();
    document.getElementById("result").textContent = JSON.stringify(data, null, 2);
    if (response.ok) {
      const loginResp = await fetch("/api/v1/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ login: data.username, password: payload.password }),
      });
      const loginData = await loginResp.json();
      if (loginResp.ok && loginData.access_token && loginData.refresh_token) {
        setAuthCookies(loginData.access_token, loginData.refresh_token);
        window.location.href = "/";
      }
    }
  }
</script>
{% endblock %}
