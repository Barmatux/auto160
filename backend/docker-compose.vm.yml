services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto160-api
    restart: unless-stopped
    env_file:
      - .env.vm
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:16
    container_name: auto160-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auto160}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-auto160}"]
      interval: 5s
      timeout: 3s
      retries: 15

  minio:
    image: minio/minio:latest
    container_name: auto160-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  avby-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto160-avby-sync
    restart: unless-stopped
    env_file:
      - .env.vm
    depends_on:
      db:
        condition: service_healthy
    command: >
      python tools/schedule_avby_listings_sync.py
      --interval-minutes 20
      --max-hp 160
      --max-pages 30
      --per-model-limit 30
      --archive-overpowered

volumes:
  pgdata:
  minio_data:
