services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto160-api
    restart: unless-stopped
    env_file:
      - .env.vm
    environment:
      LOG_DIR: /app/logs
      LOG_SERVICE: api
    volumes:
      - ../logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:16
    container_name: auto160-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auto160}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-auto160}"]
      interval: 5s
      timeout: 3s
      retries: 15

  minio:
    image: minio/minio:latest
    container_name: auto160-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  avby-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto160-avby-sync
    restart: unless-stopped
    env_file:
      - .env.vm
    environment:
      LOG_DIR: /app/logs
      LOG_SERVICE: avby-sync
    volumes:
      - ../logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    command: >
      python tools/schedule_avby_listings_sync.py
      --interval-minutes 20
      --year-min 2010
      --price-usd-min 10000
      --max-hp 160
      --creation-date 10
      --sort 4
      --max-pages 30
      --per-model-limit 30
      --archive-overpowered

  avby-vin-session:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto160-avby-vin-session
    restart: unless-stopped
    env_file:
      - .env.vm
    environment:
      LOG_DIR: /app/logs
      LOG_SERVICE: avby-vin-session
    volumes:
      - ../logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    command: >
      python tools/keep_avby_session_alive.py
      --interval-minutes 15
      --refresh-if-within-minutes 15

volumes:
  pgdata:
  minio_data:
