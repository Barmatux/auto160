name: Deploy to VM

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VM_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/auto160"
            fi
            export APP_DIR
            bash "$APP_DIR/scripts/deploy-vm.sh"
